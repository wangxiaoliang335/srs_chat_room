# RTC configuration for SRS
listen              1935;
max_connections     1000;
daemon              on;
srs_log_tank        file;
srs_log_file        ./objs/srs.log;
srs_log_level       info;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8088;
    dir             ./objs/nginx/html;
}

rtc_server {
    enabled         on;
    listen          8000; # UDP port
    candidate       47.107.33.154;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }
    
    # HTTP-FLV配置（用于翻译服务接收音频流）
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    
    dvr {
        enabled     on;
        dvr_path    ./objs/nginx/html/index/dvr/[app]/[stream]/[timestamp].mp4;
        dvr_plan    session;
    }
    
    # HTTP 回调 - 当用户开始/停止发布流时通知 callback_server
    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8085/api/v1/streams/on_publish;
        on_unpublish    http://127.0.0.1:8085/api/v1/streams/on_unpublish;
    }
}
