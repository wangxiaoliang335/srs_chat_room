# SRS配置 - 支持语音翻译
# 使用此配置启动SRS，会自动调用翻译服务

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_file        ./objs/srs.log;
srs_log_level       trace;

# HTTP服务器（用于HTTP-FLV流）
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# HTTP API（用于管理和查询）
http_api {
    enabled         on;
    listen          1985;
}

# 统计信息
stats {
    network         0;
}

# WebRTC服务器配置
rtc_server {
    enabled on;
    listen 8000; # UDP端口
    # 设置服务器公网IP（如果在内网，需要设置）
    candidate $CANDIDATE;
}

vhost __defaultVhost__ {
    # 最小延迟配置
    play {
        mw_latency 100;
    }
    
    # HTTP-FLV 配置
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    
    # WebRTC配置
    rtc {
        enabled     on;
        rtmp_to_rtc off;
        rtc_to_rtmp on;
    }
    
    # HTTP Hooks配置
    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8085/api/v1/streams/on_publish;
        on_unpublish    http://127.0.0.1:8085/api/v1/streams/on_unpublish;
        on_play         http://127.0.0.1:8085/api/v1/streams/on_play;
        on_stop         http://127.0.0.1:8085/api/v1/streams/on_stop;
    }
}

# 强制使用本地 vhost
vhost 127.0.0.1 {
    # 启用 HTTP-FLV
    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
}
