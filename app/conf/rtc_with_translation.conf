# SRS配置 - 支持语音翻译
# 使用此配置启动SRS，会自动调用翻译服务

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_file        ./objs/srs.log;
srs_log_level       trace;

# HTTP服务器（用于HTTP-FLV流）
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# HTTP API（用于管理和查询）
http_api {
    enabled         on;
    listen          1985;
}

# 统计信息
stats {
    network         0;
}

# WebRTC服务器配置
rtc_server {
    enabled on;
    listen 8000; # UDP端口
    # 设置服务器公网IP（如果在内网，需要设置）
    candidate $CANDIDATE;
}

vhost __defaultVhost__ {
    # 播放配置（用于拉流客户端）
    play {
        mw_latency 100;
    }
    
    # 发布配置（用于推流客户端）
    publish {
        # 第一个数据包超时（毫秒）
        firstpkt_timeout 60000;
        # 正常数据包超时（毫秒）
        normal_timeout 30000;
    }
    
    # WebRTC配置
    rtc {
        enabled     on;
        rtmp_to_rtc off;
        rtc_to_rtmp on;   # 开启后 WebRTC 推流会自动转换为 RTMP，HTTP-FLV 拉流即可工作
    }
    
    # HTTP-FLV配置（用于翻译服务接收音频流）
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    
    # HTTP Hooks配置（自动启动/停止翻译服务）
    http_hooks {
        enabled         on;
        # 当有用户发布流时，调用回调服务启动翻译
        on_publish      http://127.0.0.1:8085/api/v1/streams/on_publish;
        # 当用户停止发布时，调用回调服务停止翻译
        on_unpublish    http://127.0.0.1:8085/api/v1/streams/on_unpublish;
        # 可选：播放和停止播放的回调
        on_play         http://127.0.0.1:8085/api/v1/streams/on_play;
        on_stop         http://127.0.0.1:8085/api/v1/streams/on_stop;
    }
}
